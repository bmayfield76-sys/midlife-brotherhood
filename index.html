function getToday() {
  return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!email || !password) { setError('Enter your email and access code.'); return; }
    setLoading(true); setError('');
    const { error: err } = await sb.auth.signInWithPassword({ email, password });
    if (err) { setError('Access denied. Check your credentials.'); setLoading(false); }
  }

  return (
    <div className="login-screen">
      <div className="login-logo">Midlife Brotherhood</div>
      <div className="login-sub">Members Only</div>
      <div className="login-card">
        {error && <div className="error-msg">{error}</div>}
        <label>Email</label>
        <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        <label>Access Code</label>
        <input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        <button className="login-btn" onClick={handleLogin} disabled={loading}>{loading?'Checking...':'Enter the Brotherhood'}</button>
        <div className="login-footer">Access granted by Coach Billy Mayfield only.</div>
      </div>
    </div>
  );
}

function ResetPasswordScreen() {
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [msg, setMsg] = useState('');
  const [done, setDone] = useState(false);
  const isInvite = window.location.hash && window.location.hash.includes('type=invite');

  async function handleReset() {
    if (!password || password !== confirm) { setMsg('Passwords do not match.'); return; }
    if (password.length < 6) { setMsg('Password must be at least 6 characters.'); return; }
    const { error } = await sb.auth.updateUser({ password });
    if (error) { setMsg('Something went wrong. Try again.'); }
    else {
      setDone(true);
      setMsg(isInvite ? 'Welcome to the Brotherhood. Taking you in now...' : 'Password updated. Taking you in now...');
      setTimeout(()=>{ window.location.href = window.location.pathname; }, 2000);
    }
  }

  return (
    <div className="login-screen">
      <div className="login-logo">Midlife Brotherhood</div>
      <div className="login-sub">{isInvite ? 'Welcome, Brother' : 'Reset Password'}</div>
      <div className="login-card">
        {isInvite && !done && (

function ProgressPage({ user, profile }) {
  const [subtab, setSubtab] = useState('overview');
  const [unit, setUnit] = useState('imperial'); // imperial = lbs/in, metric = kg/cm
  const [measurements, setMeasurements] = useState([]);
  const [photos, setPhotos] = useState([]);
  const [loadingMeas, setLoadingMeas] = useState(true);
  const [loadingPhotos, setLoadingPhotos] = useState(true);
  const [saved, setSaved] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [uploadError, setUploadError] = useState('');

  const emptyMeas = {
    weight:'',height:'',shoulders:'',chest:'',
    upper_arm_right:'',upper_arm_left:'',waist:'',hips:'',
    thigh_right:'',thigh_left:'',calf_right:'',calf_left:''
  };
  const [form, setForm] = useState(emptyMeas);

  const [photoFiles, setPhotoFiles] = useState({front:null,back:null,side:null});
  const [photoPreviews, setPhotoPreviews] = useState({front:null,back:null,side:null});

  useEffect(()=>{ loadMeasurements(); loadPhotos(); },[]);

  async function loadMeasurements() {
    const { data } = await sb.from('measurements').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(12);
    setMeasurements(data||[]); setLoadingMeas(false);
  }

  async function loadPhotos() {
    const { data } = await sb.from('progress_photos').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(12);
    setPhotos(data||[]); setLoadingPhotos(false);
  }

  function displayVal(valInLbs, isWeight=true) {
    if (!valInLbs) return '--';
    if (unit === 'metric') {
      return isWeight ? `${lbsToKg(valInLbs)} kg` : `${inToCm(valInLbs)} cm`;
    }
    return isWeight ? `${valInLbs} lbs` : `${valInLbs} in`;
  }

  async function saveMeasurements() {
    const payload = { user_id: user.id };
    Object.keys(form).forEach(k => { payload[k] = parseFloat(form[k])||null; });
    await sb.from('measurements').insert(payload);
    setForm(emptyMeas); setSaved(true);
    loadMeasurements();
    setTimeout(()=>setSaved(false),2500);
  }

  function handlePhotoSelect(angle, file) {
    if (!file) return;
    setPhotoFiles(p=>({...p,[angle]:file}));
    setPhotoPreviews(p=>({...p,[angle]:URL.createObjectURL(file)}));
  }

  async function uploadPhotos() {
    if (!photoFiles.front && !photoFiles.back && !photoFiles.side) return;
    setUploading(true);
    setUploadError("");
    const month = new Date().toISOString().slice(0,7);
    const urls = {};
    for (const angle of ["front","back","side"]) {
      if (!photoFiles[angle]) continue;
      const path = `${user.id}/${month}/${angle}-${Date.now()}.jpg`;
      const { error: storageErr } = await sb.storage.from("progress-photos").upload(path, photoFiles[angle], {upsert:true});
      if (storageErr) { setUploadError(`Storage error (${angle}): ${storageErr.message}`); setUploading(false); return; }
      const { data: urlData } = sb.storage.from("progress-photos").getPublicUrl(path);
      urls[angle] = urlData.publicUrl;
    }
    if (Object.keys(urls).length > 0) {
      const { error: dbErr } = await sb.from("progress_photos").insert({
        user_id: user.id,
        month,
        front_url: urls.front||null,
        back_url: urls.back||null,
        side_url: urls.side||null
      });
      if (dbErr) { setUploadError(`Database error: ${dbErr.message}`); setUploading(false); return; }
    }
    setPhotoFiles({front:null,back:null,side:null});
    setPhotoPreviews({front:null,back:null,side:null});
    setUploading(false);
    loadPhotos();
    setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  }

  const latest = measurements[0];
  const pct = (cur,start,goal) => {
    if (!start||!goal||start===goal) return 0;
    return Math.min(100,Math.round(((start-cur)/(start-goal))*100));
  };

  const measFields = [
    ['weight','Weight',true],['height','Height',false],
    ['shoulders','Shoulders',false],['chest','Chest',false],
    ['upper_arm_right','Bicep (R)',false],['upper_arm_left','Bicep (L)',false],
    ['waist','Waist',false],['hips','Hips',false],
    ['thigh_right','Thigh (R)',false],['thigh_left','Thigh (L)',false],
    ['calf_right','Calf (R)',false],['calf_left','Calf (L)',false],
  ];

  return (
    <div>
      <div className="greeting-day">Your Journey</div>
      <div className="greeting-name">Progress Tracker</div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="prog-subtab-row" style={{marginBottom:0}}>
          {[['overview','Overview'],['measurements','Measurements'],['photos','Photos']].map(([key,label])=>(
            <button key={key} className={`prog-subtab${subtab===key?' active':''}`} onClick={()=>setSubtab(key)}>{label}</button>
          ))}
        </div>
        <div className="unit-toggle">
          <button className={`unit-btn${unit==='imperial'?' active':''}`} onClick={()=>setUnit('imperial')}>lbs</button>
          <button className={`unit-btn${unit==='metric'?' active':''}`} onClick={()=>setUnit('metric')}>kg</button>
        </div>
      </div>

      {subtab==='overview' && (
        <div>
          <div className="progress-card">
            <div className="progress-label">Current Weight</div>
            <div><span className="progress-val">{unit==='metric'?lbsToKg(profile?.current_weight):profile?.current_weight||'--'}</span><span className="progress-unit">{unit==='metric'?'kg':'lbs'}</span></div>
            <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:`${pct(profile?.current_weight,profile?.start_weight,profile?.goal_weight)}%`}}/></div>
            <div className="progress-sub">Goal: {unit==='metric'?lbsToKg(profile?.goal_weight):profile?.goal_weight||'--'} {unit==='metric'?'kg':'lbs'} · Started: {unit==='metric'?lbsToKg(profile?.start_weight):profile?.start_weight||'--'} {unit==='metric'?'kg':'lbs'}</div>
          </div>
          <div className="progress-card">
            <div className="progress-label">Day Number</div>
            <div><span className="progress-val">{profile?.day_number||1}</span><span className="progress-unit">of 90</span></div>
            <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:`${Math.round(((profile?.day_number||1)/90)*100)}%`}}/></div>
            <div className="progress-sub">{90-(profile?.day_number||1)} days remaining in your current program</div>
          </div>
          <div className="progress-card">
            <div className="progress-label">Adherence Rate</div>
            <div><span className="progress-val">{profile?.adherence||0}</span><span className="progress-unit">%</span></div>
            <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:`${profile?.adherence||0}%`}}/></div>
            <div className="progress-sub">Based on check-ins completed</div>
          </div>
          {latest && (
            <div>
              <div className="section-header">Latest Measurements</div>
              <div className="meas-history-item">
                <div className="meas-date">{new Date(latest.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
                <div className="meas-vals">
                  {measFields.filter(([k])=>latest[k]).map(([k,label,isW])=>(
                    <div key={k} className="meas-val-item">
                      <div className="meas-val-num">{unit==='metric'?(isW?lbsToKg(latest[k]):inToCm(latest[k])):latest[k]}</div>
                      <div className="meas-val-label">{label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {subtab==='measurements' && (
        <div>
          <div className="section-header">Log This Week's Measurements</div>
          <div style={{background:'var(--card)',border:'0.5px solid var(--border)',borderRadius:4,padding:'16px 18px',marginBottom:12}}>
            <div className="meas-grid">
              {measFields.map(([key,label,isWeight])=>(
                <div key={key} className="meas-field">
                  <label>{label} ({unit==='metric'?(isWeight?'kg':'cm'):(isWeight?'lbs':'in')})</label>
                  <input
                    type="number"
                    step="0.1"
                    placeholder="0"
                    value={form[key]}
                    onChange={e=>{
                      const raw = e.target.value;
                      // Store always in lbs/inches internally
                      const stored = unit==='metric'?(isWeight?kgToLbs(raw):cmToIn(raw)):raw;
                      setForm(f=>({...f,[key]:stored}));
                    }}
                  />
                </div>
              ))}
            </div>
            <button className="btn-full" onClick={saveMeasurements}>Save Measurements</button>
            {saved && <div className="success-msg">Saved.</div>}
          </div>

          <div className="section-header">Measurement History</div>
          {loadingMeas && <div className="loading">Loading...</div>}
          {!loadingMeas && measurements.length===0 && <div className="loading">No measurements logged yet.</div>}
          {measurements.map(m=>(
            <div key={m.id} className="meas-history-item">
              <div className="meas-date">{new Date(m.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
              <div className="meas-vals">
                {measFields.filter(([k])=>m[k]).map(([k,label,isW])=>(
                  <div key={k} className="meas-val-item">
                    <div className="meas-val-num">{unit==='metric'?(isW?lbsToKg(m[k]):inToCm(m[k])):m[k]}</div>
                    <div className="meas-val-label">{label}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {subtab==='photos' && (
        <div>
          <div className="section-header">This Month's Photos</div>
          <div className="photo-grid">
            {['front','back','side'].map(angle=>(
              <div key={angle} className="photo-slot">
                {photoPreviews[angle] && <img src={photoPreviews[angle]} alt={angle}/>}
                {!photoPreviews[angle] && <><i className="ti ti-camera photo-slot-icon"/><div className="photo-slot-label">{angle}</div></>}
                <div className="photo-slot-name">{angle}</div>
                <input type="file" accept="image/*" capture="environment" onChange={e=>handlePhotoSelect(angle,e.target.files[0])}/>
              </div>
            ))}
          </div>
          <button className="btn-full" onClick={uploadPhotos} disabled={uploading}>
            {uploading?'Uploading...':'Upload Photos'}
          </button>
          {saved && <div className="success-msg">Photos saved.</div>}
          {uploadError && <div className="error-msg" style={{marginTop:8}}>{uploadError}</div>}

          <div className="section-header">Photo History</div>
          {loadingPhotos && <div className="loading">Loading...</div>}
          {!loadingPhotos && photos.length===0 && <div className="loading">No photos uploaded yet.</div>}
          {photos.map(p=>(
            <div key={p.id} className="photo-history-month">
              <div className="photo-history-label">{p.month}</div>
              <div className="photo-history-row">
                {['front','back','side'].map(angle=>(
                  p[`${angle}_url`] ? (
                    <div key={angle} className="photo-thumb">
                      <img src={p[`${angle}_url`]} alt={angle}/>
                      <div className="photo-thumb-label">{angle}</div>
                    </div>
                  ) : <div key={angle} className="photo-thumb" style={{background:'#111',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'var(--grey)',fontSize:11,fontFamily:'Barlow Condensed',letterSpacing:1,textTransform:'uppercase'}}>{angle}</span></div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ToolsPage({ user, profile }) {
  const COACH_EMAIL = 'bmayfield76@gmail.com';

  async function sendToCoach(message) {
    const { data: coachData } = await sb.from('profiles').select('id').eq('email', COACH_EMAIL).single();
    if (!coachData) return false;
    await sb.from('messages').insert({
      sender_id: user.id,
      recipient_id: coachData.id,
      content: message,
      from_coach: false
    });
    return true;
  }

  // Quick Method
  function QuickCalc() {
    const [weight, setWeight] = useState('');
    const [unit, setUnit] = useState('lbs');
    const [result, setResult] = useState(null);
    const [sent, setSent] = useState(false);

    function calc() {
      const w = parseFloat(weight);
      if (!w) return;
      const lbs = unit === 'kg' ? w * 2.20462 : w;
      const tdee = Math.round(lbs * 15);
      setResult(tdee); setSent(false);
    }

    async function send() {
      if (!result) return;
      await sendToCoach(`TDEE Quick Method Result\nWeight: ${weight} ${unit}\nEstimated TDEE: ${result} calories/day\n\nGoal targets:\nCut: ${result-500} cal | Maintain: ${result} cal | Bulk: ${result+300} cal`);
      setSent(true);
    }

    return (
      <ToolCard icon="ti-bolt" title="Quick Method" subtitle="Bodyweight × 15 — instant estimate">
        <div className="tool-grid">
          <div className="tool-field">
            <label>Weight</label>
            <input type="number" placeholder="0" value={weight} onChange={e=>setWeight(e.target.value)}/>
          </div>
          <div className="tool-field">
            <label>Unit</label>
            <select value={unit} onChange={e=>setUnit(e.target.value)}>
              <option value="lbs">lbs</option>
              <option value="kg">kg</option>
            </select>
          </div>
        </div>
        <button className="calc-btn" onClick={calc}>Calculate</button>
        {result && (
          <ResultBox
            result={result}
            label="calories / day"
            breakdown={[
              {label:'Cut (−500)',val:`${result-500} cal`},
              {label:'Maintain',val:`${result} cal`},

  // Mifflin-St Jeor
  function MifflinCalc() {
    const [gender, setGender] = useState('male');
    const [age, setAge] = useState('');
    const [weight, setWeight] = useState('');
    const [heightFt, setHeightFt] = useState('');
    const [heightIn, setHeightIn] = useState('');
    const [unit, setUnit] = useState('imperial');
    const [activity, setActivity] = useState('1.375');
    const [result, setResult] = useState(null);
    const [sent, setSent] = useState(false);

    function calc() {
      const w = parseFloat(weight);
      const a = parseFloat(age);
      const act = parseFloat(activity);
      if (!w || !a) return;
      let weightKg = unit === 'lbs' ? w * 0.453592 : w;
      let heightCm = unit === 'imperial'
        ? (parseFloat(heightFt)||0) * 30.48 + (parseFloat(heightIn)||0) * 2.54
        : parseFloat(weight); // handled below
      if (unit === 'metric') {
        heightCm = parseFloat(heightFt); // using heightFt field for cm in metric
      }
      let bmr = gender === 'male'
        ? (10 * weightKg) + (6.25 * heightCm) - (5 * a) + 5
        : (10 * weightKg) + (6.25 * heightCm) - (5 * a) - 161;
      const tdee = Math.round(bmr * act);
      setResult({bmr: Math.round(bmr), tdee}); setSent(false);
    }

      if (!result) return;

          <div className="tool-field">
            <label>Weight ({unit==='imperial'?'lbs':'kg'})</label>
            <input type="number" placeholder="0" value={weight} onChange={e=>setWeight(e.target.value)}/>
          </div>

            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>

  // Harris-Benedict
  function HarrisCalc() {
    const [gender, setGender] = useState('male');
    const [age, setAge] = useState('');
    const [weight, setWeight] = useState('');
    const [heightFt, setHeightFt] = useState('');
    const [heightIn, setHeightIn] = useState('');
    const [unit, setUnit] = useState('imperial');
    const [activity, setActivity] = useState('1.375');
    const [result, setResult] = useState(null);
    const [sent, setSent] = useState(false);

    function calc() {
      const w = parseFloat(weight);
      const a = parseFloat(age);
      const act = parseFloat(activity);
      if (!w || !a) return;
      let weightKg = unit === 'lbs' ? w * 0.453592 : w;
      let heightCm = unit === 'imperial'
        ? (parseFloat(heightFt)||0) * 30.48 + (parseFloat(heightIn)||0) * 2.54
        : parseFloat(heightFt);
      // Harris-Benedict revised (Roza & Shizgal 1984)
      let bmr = gender === 'male'
        ? 88.362 + (13.397 * weightKg) + (4.799 * heightCm) - (5.677 * a)
        : 447.593 + (9.247 * weightKg) + (3.098 * heightCm) - (4.330 * a);
      // Mifflin for comparison
      let mifflin = gender === 'male'
        ? (10 * weightKg) + (6.25 * heightCm) - (5 * a) + 5
        : (10 * weightKg) + (6.25 * heightCm) - (5 * a) - 161;
      const tdee = Math.round(bmr * act);
      const mifflinTdee = Math.round(mifflin * act);
      setResult({bmr: Math.round(bmr), tdee, mifflinTdee}); setSent(false);
    }

    async function send() {
      if (!result) return;
      await sendToCoach(`TDEE Harris-Benedict Result\nBMR: ${result.bmr} cal\nHarris-Benedict TDEE: ${result.tdee} cal/day\nMifflin-St Jeor TDEE: ${result.mifflinTdee} cal/day\n\nGoal targets:\nCut: ${result.tdee-500} cal | Maintain: ${result.tdee} cal | Bulk: ${result.tdee+300} cal`);
      setSent(true);
    }

    return (

          <label>Gender</label>

            <button className={`gender-btn${gender==='female'?' active':''}`} onClick={()=>setGender('female')}>Female</button>
          </div>
        </div>
        <div className="tool-grid">
          <div className="tool-field">
            <label>Unit System</label>
            <select value={unit} onChange={e=>setUnit(e.target.value)}>
              <option value="imperial">Imperial (lbs/ft)</option>
              <option value="metric">Metric (kg/cm)</option>
            </select>
          </div>
          <div className="tool-field">
            <label>Age</label>
            <input type="number" placeholder="0" value={age} onChange={e=>setAge(e.target.value)}/>
          </div>
        </div>
        <div className="tool-grid">
          <div className="tool-field">
            <label>Weight ({unit==='imperial'?'lbs':'kg'})</label>
            <input type="number" placeholder="0" value={weight} onChange={e=>setWeight(e.target.value)}/>
          </div>
          {unit === 'imperial' ? (
            <>
              <div className="tool-field">
                <label>Height (ft)</label>
                <input type="number" placeholder="5" value={heightFt} onChange={e=>setHeightFt(e.target.value)}/>
              </div>
              <div className="tool-field">
                <label>Height (in)</label>
                <input type="number" placeholder="10" value={heightIn} onChange={e=>setHeightIn(e.target.value)}/>
              </div>
            </>
          ) : (
            <div className="tool-field">
              <label>Height (cm)</label>
              <input type="number" placeholder="178" value={heightFt} onChange={e=>setHeightFt(e.target.value)}/>
            </div>
          )}
        </div>
        <div className="tool-field">
          <label>Activity Level</label>
          <select value={activity} onChange={e=>setActivity(e.target.value)}>
            <option value="1.2">Sedentary (desk job, little exercise)</option>
            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>
            <option value="1.725">Very Active (6-7 days/week)</option>
            <option value="1.9">Extra Active (physical job + training)</option>
          </select>
        </div>
        <button className="calc-btn" onClick={calc}>Calculate</button>
        {result && (
          <ResultBox
            result={result.tdee}
            label="calories / day (Harris-Benedict)"
            breakdown={[
              {label:'H-B BMR',val:`${result.bmr} cal`},
              {label:'H-B TDEE',val:`${result.tdee} cal`},
              {label:'Mifflin TDEE',val:`${result.mifflinTdee} cal`},
              {label:'Difference',val:`${Math.abs(result.tdee-result.mifflinTdee)} cal`},
            ]}
            onSendCoach={send}
            sent={sent}
          />
        )}
      </ToolCard>
    );
  }

  // Navy Body Fat + Katch-McArdle
  function NavyKatchCalc() {
    const [gender, setGender] = useState('male');
    const [unit, setUnit] = useState('imperial');
    const [waist, setWaist] = useState('');
    const [neck, setNeck] = useState('');
    const [hips, setHips] = useState('');
    const [heightFt, setHeightFt] = useState('');
    const [heightIn, setHeightIn] = useState('');
    const [weight, setWeight] = useState('');
    const [activity, setActivity] = useState('1.375');
    const [result, setResult] = useState(null);
    const [sent, setSent] = useState(false);

    function calc() {
      const w = parseFloat(weight);
      const wa = parseFloat(waist);
      const ne = parseFloat(neck);
      const hi = parseFloat(hips);
      if (!w || !wa || !ne) return;

      let weightLbs = unit === 'kg' ? w * 2.20462 : w;
      let waistCm = unit === 'imperial' ? wa * 2.54 : wa;
      let neckCm = unit === 'imperial' ? ne * 2.54 : ne;
      let hipsCm = unit === 'imperial' ? (hi||0) * 2.54 : (hi||0);
      let heightCm = unit === 'imperial'
        ? (parseFloat(heightFt)||0) * 30.48 + (parseFloat(heightIn)||0) * 2.54
        : parseFloat(heightFt);

      let bf;
      if (gender === 'male') {
        bf = 86.010 * Math.log10(waistCm - neckCm) - 70.041 * Math.log10(heightCm) + 36.76;
      } else {
        bf = 163.205 * Math.log10(waistCm + hipsCm - neckCm) - 97.684 * Math.log10(heightCm) - 78.387;
      }
      bf = Math.max(3, Math.min(60, parseFloat(bf.toFixed(1))));

      const weightKg = weightLbs * 0.453592;
      const lbm = weightKg * (1 - bf / 100);
      const bmr = 370 + (21.6 * lbm);
      const tdee = Math.round(bmr * parseFloat(activity));
      const fatMass = parseFloat((weightLbs * (bf/100)).toFixed(1));
      const leanLbs = parseFloat((weightLbs - fatMass).toFixed(1));

      setResult({ bf, bmr: Math.round(bmr), tdee, fatMass, leanLbs }); setSent(false);
    }

    async function send() {
      if (!result) return;
      await sendToCoach(`Body Fat + Katch-McArdle TDEE Result\nBody Fat: ${result.bf}% | Lean Mass: ${result.leanLbs} lbs | Fat Mass: ${result.fatMass} lbs\nBMR (Katch-McArdle): ${result.bmr} cal\nTDEE: ${result.tdee} cal/day\n\nGoal targets:\nCut: ${result.tdee-500} cal | Maintain: ${result.tdee} cal | Bulk: ${result.tdee+300} cal`);
      setSent(true);
    }

    return (
      <ToolCard icon="ti-body-scan" title="Body Fat + Katch-McArdle" subtitle="Navy Method feeds directly into Katch-McArdle">
        <div className="tool-field">
          <label>Gender</label>
          <div className="gender-toggle">
            <button className={`gender-btn${gender==='male'?' active':''}`} onClick={()=>setGender('male')}>Male</button>
            <button className={`gender-btn${gender==='female'?' active':''}`} onClick={()=>setGender('female')}>Female</button>
          </div>
        </div>
        <div className="tool-field">
          <label>Unit System</label>
          <select value={unit} onChange={e=>setUnit(e.target.value)}>
            <option value="imperial">Imperial (lbs/in)</option>
            <option value="metric">Metric (kg/cm)</option>
          </select>
        </div>
        <div className="tool-grid">
          <div className="tool-field">
            <label>Weight ({unit==='imperial'?'lbs':'kg'})</label>
            <input type="number" placeholder="0" value={weight} onChange={e=>setWeight(e.target.value)}/>
          </div>
          {unit === 'imperial' ? (
            <>
              <div className="tool-field">
                <label>Height (ft)</label>
                <input type="number" placeholder="5" value={heightFt} onChange={e=>setHeightFt(e.target.value)}/>
              </div>
              <div className="tool-field">
                <label>Height (in)</label>
                <input type="number" placeholder="10" value={heightIn} onChange={e=>setHeightIn(e.target.value)}/>
              </div>
            </>
          ) : (
            <div className="tool-field">
              <label>Height (cm)</label>
              <input type="number" placeholder="178" value={heightFt} onChange={e=>setHeightFt(e.target.value)}/>
            </div>
          )}
        </div>
        <div className="tool-grid">
          <div className="tool-field">
            <label>Waist ({unit==='imperial'?'in':'cm'}) — at navel</label>
            <input type="number" step="0.1" placeholder="0" value={waist} onChange={e=>setWaist(e.target.value)}/>
          </div>
          <div className="tool-field">
            <label>Neck ({unit==='imperial'?'in':'cm'})</label>
            <input type="number" step="0.1" placeholder="0" value={neck} onChange={e=>setNeck(e.target.value)}/>
          </div>
        </div>
        {gender === 'female' && (
          <div className="tool-field">
            <label>Hips ({unit==='imperial'?'in':'cm'}) — widest point</label>
            <input type="number" step="0.1" placeholder="0" value={hips} onChange={e=>setHips(e.target.value)}/>
          </div>
        )}
        <div className="tool-field">
          <label>Activity Level</label>
          <select value={activity} onChange={e=>setActivity(e.target.value)}>
            <option value="1.2">Sedentary (desk job, little exercise)</option>
            <option value="1.375">Light (1-3 days/week)</option>
            <option value="1.55">Moderate (3-5 days/week)</option>
            <option value="1.725">Very Active (6-7 days/week)</option>
            <option value="1.9">Extra Active (physical job + training)</option>
          </select>
        </div>
        <button className="calc-btn" onClick={calc}>Calculate</button>
        {result && (
          <ResultBox
            result={result.tdee}
            label="calories / day (Katch-McArdle)"
            breakdown={[
              {label:'Body Fat %',val:`${result.bf}%`},
              {label:'Lean Mass',val:`${result.leanLbs} lbs`},
              {label:'Fat Mass',val:`${result.fatMass} lbs`},
              {label:'BMR',val:`${result.bmr} cal`},
              {label:'Cut (−500)',val:`${result.tdee-500} cal`},
              {label:'Maintain',val:`${result.tdee} cal`},
            ]}
            onSendCoach={send}
            sent={sent}
          />
        )}
      </ToolCard>
    );
  }

  return (
    <div>
      <div className="greeting-day">Coach Billy's Toolkit</div>

      <MifflinCalc/>

}

function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState('home');
  const [authLoading, setAuthLoading] = useState(true);
  const [isReset, setIsReset] = useState(false);

  useEffect(()=>{
    const hash = window.location.hash;
    const isRecovery = hash && (hash.includes('type=recovery') || hash.includes('type=invite'));
    if (isRecovery) {
      setIsReset(true);
      sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setAuthLoading(false); });
    } else {
      sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setAuthLoading(false); });
    }
    sb.auth.onAuthStateChange((event,session)=>{
      if (event==='PASSWORD_RECOVERY' || event==='SIGNED_IN' && hash && hash.includes('type=invite')) setIsReset(true);
      setSession(session); setAuthLoading(false);
    });
  },[]);

  useEffect(()=>{
    if (session?.user) loadProfile(session.user.id);
  },[session]);

  async function loadProfile(uid) {
    const { data } = await sb.from('profiles').select('*').eq('id',uid).single();
    setProfile(data);
  }

  async function handleLogout() {
    await sb.auth.signOut();
    setSession(null); setProfile(null);
  }

  if (authLoading) return <div className="loading" style={{paddingTop:80}}>Loading...</div>;
  if (isReset && session) return <ResetPasswordScreen/>;
  if (!session) return <LoginScreen onLogin={()=>{}}/>;

  const user = session.user;
  const initials = profile?.name?profile.name.split(' ').map(n=>n[0]).join('').toUpperCase():user.email[0].toUpperCase();

  const tabs = [
    {key:'home',icon:'ti-home',label:'Home'},
    {key:'pack',icon:'ti-shield',label:'Pack'},
    {key:'meals',icon:'ti-tool-kitchen-2',label:'Meals'},
    {key:'progress',icon:'ti-chart-line',label:'Progress'},
    {key:'tools',icon:'ti-calculator',label:'Tools'},
    {key:'coach',icon:'ti-message',label:'Coach'},
  ];

  return (
    <div style={{background:'var(--black)',minHeight:'100vh'}}>
      <div className="top-nav">
        <div className="nav-logo">MB<span>.</span></div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div className="nav-avatar" onClick={handleLogout} title="Tap to sign out">{initials}</div>
        </div>
      </div>
      <div className="main-content">
        {tab==='home' && <HomePage user={user} profile={profile}/>}
        {tab==='pack' && <PackPage user={user} profile={profile}/>}
        {tab==='meals' && <MealsPage user={user}/>}
        {tab==='progress' && <ProgressPage user={user} profile={profile}/>}
        {tab==='tools' && <ToolsPage user={user} profile={profile}/>}
        {tab==='coach' && <CoachPage user={user} profile={profile}/>}
      </div>
      <div className="tab-bar">
        {tabs.map(t=>(
          <button key={t.key} className={`tab-item${tab===t.key?' active':''}`} onClick={()=>setTab(t.key)}>
            <i className={`ti ${t.icon}`}/>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

styleEl.textContent = styles;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
