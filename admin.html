function timeAgo(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!email || !password) { setError('Enter your credentials.'); return; }
    setLoading(true); setError('');
    const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
    if (err || data?.user?.email !== COACH_EMAIL) {
      await sb.auth.signOut();
      setError('Coach access only.'); setLoading(false);
    }
  }

  return (
    <div className="login-screen">
      <div className="login-logo">Midlife Brotherhood</div>
      <div className="login-sub">Coach Dashboard</div>
      <div className="login-card">
        {error && <div className="error-msg">{error}</div>}
        <label>Email</label>
        <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        <label>Password</label>
        <input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        <button className="login-btn" onClick={handleLogin} disabled={loading}>{loading?'Checking...':'Enter Dashboard'}</button>
        <div className="login-footer">Authorized personnel only.</div>
      </div>
    </div>
  );
}

function MealsTab({ coachId }) {
  const [clients, setClients] = useState([]);
  const [selectedId, setSelectedId] = useState('');
  const [meals, setMeals] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saved, setSaved] = useState(false);

  const emptyMeal = ()=>({id:Date.now()+Math.random(), meal_time:'', meal_name:'', protein:'', carbs:'', fat:'', calories:'', isNew:true});

  useEffect(()=>{ loadClients(); },[]);

  async function loadClients() {
    const { data } = await sb.from('profiles').select('id,name').neq('email',COACH_EMAIL).order('name');
    setClients(data||[]);
  }

  async function loadMeals(uid) {
    setLoading(true);
    const { data } = await sb.from('meal_plans').select('*').eq('user_id',uid).order('meal_time');
    setMeals(data||[]); setLoading(false);
  }

  function selectClient(uid) {
    setSelectedId(uid);
    if (uid) loadMeals(uid);
    else setMeals([]);
  }

  function updateMeal(idx, field, val) {
    setMeals(m=>m.map((r,i)=>i===idx?{...r,[field]:val}:r));
  }

  function addMeal() { setMeals(m=>[...m, emptyMeal()]); }

  async function removeMeal(meal) {
    if (!meal.isNew) await sb.from('meal_plans').delete().eq('id',meal.id);
    setMeals(m=>m.filter(r=>r.id!==meal.id));
  }

  async function saveMeals() {
    for (const meal of meals) {
      const payload = {
        user_id: selectedId,
        meal_time: meal.meal_time,
        meal_name: meal.meal_name,
        protein: parseInt(meal.protein)||0,
        carbs: parseInt(meal.carbs)||0,
        fat: parseInt(meal.fat)||0,
        calories: parseInt(meal.calories)||0,
      };
      if (meal.isNew) {
        await sb.from('meal_plans').insert(payload);
      } else {
        await sb.from('meal_plans').update(payload).eq('id',meal.id);
      }
    }
    setSaved(true);
    loadMeals(selectedId);
    setTimeout(()=>setSaved(false),2000);
  }

  return (
    <div>
      <div className="section-title">Meal Plans</div>
      <div className="section-sub">Assign and edit client nutrition</div>
      <div className="panel">
        <div className="field" style={{marginBottom:16}}>
          <label>Select Client</label>
          <select value={selectedId} onChange={e=>selectClient(e.target.value)}>
            <option value="">-- Choose a client --</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>

        {selectedId && (
          <div>
            {loading && <div className="loading">Loading meals...</div>}
            {!loading && (
              <div>
                <div className="meal-row-header">
                  <span>Time</span><span>Meal</span><span>Protein</span><span>Carbs</span><span>Fat</span><span>Calories</span><span></span>
                </div>
                {meals.map((meal,idx)=>(
                  <div key={meal.id} className="meal-row">
                    <input placeholder="6am" value={meal.meal_time} onChange={e=>updateMeal(idx,'meal_time',e.target.value)}/>
                    <input placeholder="Meal name" value={meal.meal_name} onChange={e=>updateMeal(idx,'meal_name',e.target.value)}/>
                    <input type="number" placeholder="0" value={meal.protein} onChange={e=>updateMeal(idx,'protein',e.target.value)}/>
                    <input type="number" placeholder="0" value={meal.carbs} onChange={e=>updateMeal(idx,'carbs',e.target.value)}/>
                    <input type="number" placeholder="0" value={meal.fat} onChange={e=>updateMeal(idx,'fat',e.target.value)}/>
                    <input type="number" placeholder="0" value={meal.calories} onChange={e=>updateMeal(idx,'calories',e.target.value)}/>
                    <button className="remove-btn" onClick={()=>removeMeal(meal)}><i className="ti ti-x"/></button>
                  </div>
                ))}
                {meals.length===0 && <div className="empty">No meals yet. Add one below.</div>}
                <div className="btn-row">
                  <button className="btn-grey" onClick={addMeal}><i className="ti ti-plus"/> Add Meal</button>
                  <button className="btn-red" onClick={saveMeals}>Save Plan</button>
                </div>
                {saved && <div className="success-msg">Meal plan saved.</div>}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

      .order('created_at',{ascending:true}).limit(50);

    await sb.from('messages').insert({
      sender_id: coachId,
      recipient_id: selectedId,
      content: text,
      from_coach: true
    });
    setText('');
    loadMessages(selectedId);

  const clientName = clients.find(c=>c.id===selectedId)?.name || '';

  return (

              {messages.map(m=>(
                <div key={m.id} className={`msg-item ${m.from_coach?'msg-coach':'msg-client'}`}>
                  <div className={`msg-from ${m.from_coach?'coach':'client'}`}>{m.from_coach?'Coach Billy':clientName} · {timeAgo(m.created_at)}</div>
                  {m.content}
                </div>
              ))}
              {!loading && messages.length===0 && <div className="empty">No messages yet with this client.</div>}
            </div>
            <div className="field"><label>Your Message</label><textarea placeholder={`Write to ${clientName}...`} value={text} onChange={e=>setText(e.target.value)}/></div>
            <div className="btn-row"><button className="btn-red" onClick={sendMessage}>Send Message</button></div>
          </div>
        )}
      </div>
    </div>
  );
}

function CheckinsTab() {
  const [clients, setClients] = useState([]);
  const [selectedId, setSelectedId] = useState('');
  const [checkins, setCheckins] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(()=>{ loadClients(); },[]);

  async function loadClients() {
    const { data } = await sb.from('profiles').select('id,name').neq('email',COACH_EMAIL).order('name');
    setClients(data||[]);
  }

  async function loadCheckins(uid) {
    setLoading(true);
    const { data } = await sb.from('checkins').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(30);
    setCheckins(data||[]); setLoading(false);
  }

  function selectClient(uid) {
    setSelectedId(uid);
    if (uid) loadCheckins(uid);
    else setCheckins([]);
  }

  const pillars = [['body','B'],['mind','M'],['purpose','P'],['finances','F'],['relationships','R'],['brotherhood','BR']];

  return (
    <div>
      <div className="section-title">Check-ins</div>
      <div className="section-sub">Client daily activity</div>
      <div className="panel">
        <div className="field" style={{marginBottom:16}}>
          <label>Select Client</label>
          <select value={selectedId} onChange={e=>selectClient(e.target.value)}>
            <option value="">-- Choose a client --</option>
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        {selectedId && (
          <div>
            {loading && <div className="loading">Loading check-ins...</div>}
            {!loading && checkins.length===0 && <div className="empty">No check-ins yet from this client.</div>}
            {checkins.map(c=>(
              <div key={c.id} className="checkin-item">
                <div className="checkin-date">{new Date(c.created_at).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div>
                <div className="pillar-dots">
                  {pillars.map(([key,label])=>(
                    <div key={key} className={`dot ${c[key]?'on':'off'}`}>{label}</div>
                  ))}
                </div>
                {c.win_log && <div className="win-text">"{c.win_log}"</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [tab, setTab] = useState('clients');

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if (session?.user?.email === COACH_EMAIL) setSession(session);
      setAuthLoading(false);
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if (session?.user?.email === COACH_EMAIL) setSession(session);
      else { setSession(null); setAuthLoading(false); }
    });
  },[]);

  async function handleLogout() {
    await sb.auth.signOut();
    setSession(null);
  }

  if (authLoading) return <div className="loading" style={{paddingTop:80}}>Loading...</div>;
  if (!session) return <LoginScreen/>;

  const tabs = [
    {key:'clients',label:'Clients'},
    {key:'meals',label:'Meal Plans'},
    {key:'messages',label:'Messages'},
    {key:'checkins',label:'Check-ins'},
  ];

  return (
    <div style={{background:'var(--black)',minHeight:'100vh'}}>
      <div className="top-nav">
        <div className="nav-logo">MB<span>.</span> <span style={{fontSize:14,color:'var(--grey)',fontFamily:'Barlow Condensed',letterSpacing:2}}>COACH</span></div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div className="nav-badge">Coach</div>
          <button className="logout-btn" onClick={handleLogout}>Sign Out</button>
        </div>
      </div>
      <div className="tab-bar">
        {tabs.map(t=>(
          <button key={t.key} className={`tab-btn${tab===t.key?' active':''}`} onClick={()=>setTab(t.key)}>{t.label}</button>
        ))}
      </div>
      <div className="main">
        {tab==='clients' && <ClientsTab coachId={session.user.id}/>}
        {tab==='meals' && <MealsTab coachId={session.user.id}/>}
        {tab==='messages' && <MessagesTab coachId={session.user.id}/>}
        {tab==='checkins' && <CheckinsTab/>}
      </div>
    </div>
  );
}

const styleEl = document.createElement('style');
styleEl.textContent = styles;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
